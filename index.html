<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>David Moya Garcia — Coming Soon</title>
<meta name="description" content="Portfolio coming soon."/>
<meta name="robots" content="noindex"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060810;--fg:#e2e8f0;--muted:#64748b;--cyan:#06b6d4}
html{color-scheme:dark}
body{background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
.container{max-width:400px}
h1{font-size:1.5rem;font-weight:700;margin-bottom:.75rem;letter-spacing:-.02em}
p{color:var(--muted);font-size:.875rem;line-height:1.6;margin-bottom:1.5rem}
a{color:var(--cyan);font-size:.8rem}
.dot{width:8px;height:8px;background:var(--cyan);border-radius:50%;margin:0 auto 2rem;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
</style>
</head>
<body>
<div class="container">
  <div class="dot"></div>
  <h1>Coming Soon</h1>
  <p>New portfolio under construction. Check back later.</p>
  <a href="https://github.com/pedri77">github.com/pedri77</a>
</div>
</body>
</html>
